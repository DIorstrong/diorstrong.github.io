backend:
  name: github
  repo: diorstrong/diorstrong.github.io
  branch: main
  base_url: https://diorstrong.github.io
  auth_endpoint: https://diorstrong-cms.wusichen666.workers.dev

media_folder: static/images/uploads
public_folder: /images/uploads

locale: zh

collections:
  - name: posts
    label: 文章
    folder: content/posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "posts/{{slug}}"
    fields:
      - label: 标题
        name: title
        widget: string

      - label: 发布日期
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: HH:mm
        format: YYYY-MM-DDTHH:mm:ss+08:00

      - label: 草稿
        name: draft
        widget: boolean
        default: true

      - label: 标签
        name: tags
        widget: list
        field:
          label: 标签
          name: tag
          widget: string

      - label: 摘要
        name: description
        widget: text
        required: false

      - label: 封面图
        name: cover
        widget: image
        required: false

      - label: 正文
        name: body
        widget: markdown

  - name: pages
    label: 独立页面
    folder: content
    create: true
    slug: "{{slug}}"
    filter:
      field: type
      value: page
    fields:
      - label: 标题
        name: title
        widget: string

      - label: 类型
        name: type
        widget: hidden
        default: page

      - label: 草稿
        name: draft
        widget: boolean
        default: false

      - label: 正文
        name: body
        widget: markdown

  - name: music-page
    label: 音乐页面
    files:
      - label: 我的音乐
        name: music
        file: content/music.md
        fields:
          - label: 标题
            name: title
            widget: string
          - label: 正文
            name: body
            widget: markdown

  - name: education-page
    label: 教育经历页面
    files:
      - label: 教育经历
        name: education
        file: content/education.md
        fields:
          - label: 标题
            name: title
            widget: string
          - label: 正文
            name: body
            widget: markdown
