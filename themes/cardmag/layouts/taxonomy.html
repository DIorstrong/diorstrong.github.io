{{ define "main" }}
<div class="content-page">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}
  <div class="page-desc">{{ . }}</div>
  {{ end }}
  <div class="tag-cloud">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="tag-link">{{ .LinkTitle }} <small>({{ len .Pages }})</small></a>
    {{ end }}
  </div>
</div>
{{ end }}
