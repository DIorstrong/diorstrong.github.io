{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      <time datetime="{{ .Date | time.Format `2006-01-02T15:04:05-07:00` }}">
        {{ .Date | time.Format "2006年01月02日" }}
      </time>
      {{ with .Params.tags }}
      <span class="tags">
        {{ range . }}
        <a href="{{ `/tags/` | relURL }}{{ . | urlize }}" class="tag">{{ . }}</a>
        {{ end }}
      </span>
      {{ end }}
    </div>
  </header>
  {{ with .Params.cover }}
  <div class="post-cover">
    <img src="{{ . | relURL }}" alt="{{ $.Title }}" loading="lazy">
  </div>
  {{ end }}
  <div class="post-content">
    {{ .Content }}
  </div>
  <footer class="post-footer">
    <a href="{{ `/posts/` | relURL }}" class="back-link">← 返回文章列表</a>
  </footer>
</article>
{{ end }}
