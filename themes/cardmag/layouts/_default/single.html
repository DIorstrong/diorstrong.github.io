{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      <time datetime="{{ .Date | time.Format `2006-01-02T15:04:05-07:00` }}">
        {{ .Date | time.Format "2006年01月02日" }}
      </time>
      {{ with .Params.tags }}
      <span class="tags">
        {{ range . }}
        <span class="tag">{{ . }}</span>
        {{ end }}
      </span>
      {{ end }}
    </div>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
