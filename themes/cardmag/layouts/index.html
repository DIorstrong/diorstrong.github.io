{{ define "main" }}
<div class="hero">
  <h1>{{ site.Title }}</h1>
  <p>{{ site.Params.description }}</p>
</div>

<div class="card-grid">
  {{ range where site.RegularPages "Section" "posts" }}
  <article class="card">
    <div class="card-body">
      <div class="card-meta">
        <time datetime="{{ .Date | time.Format `2006-01-02T15:04:05-07:00` }}">
          {{ .Date | time.Format "2006-01-02" }}
        </time>
        {{ with .Params.tags }}
        <span class="tags">
          {{ range . }}
          <span class="tag">{{ . }}</span>
          {{ end }}
        </span>
        {{ end }}
      </div>
      <h2 class="card-title"><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
      <p class="card-summary">{{ .Summary }}</p>
      <a href="{{ .RelPermalink }}" class="read-more">阅读全文 →</a>
    </div>
  </article>
  {{ end }}
</div>
{{ end }}
